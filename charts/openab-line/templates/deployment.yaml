apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openab-line.fullname" . }}
  labels:
    {{- include "openab-line.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openab-line.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "openab-line.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openab
          image: {{ include "openab-line.agentImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: HOME
              value: {{ .Values.agent.workingDir | default "/home/agent" }}
            {{- range $k := (.Values.agent.env | keys | sortAlpha) }}
            - name: {{ $k }}
              value: {{ get $.Values.agent.env $k | quote }}
            {{- end }}
            {{- range .Values.agent.secretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          {{- with .Values.agent.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/openab
              readOnly: true
            - name: data
              mountPath: {{ .Values.agent.workingDir | default "/home/agent" }}
            - name: tmp
              mountPath: /tmp

        - name: gateway
          image: {{ include "openab-line.gatewayImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: HOME
              value: {{ .Values.agent.workingDir | default "/home/agent" }}
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab-line.secretName" . }}
                  key: line-channel-secret
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab-line.secretName" . }}
                  key: line-channel-access-token
          {{- with .Values.gateway.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.agent.workingDir | default "/home/agent" }}
            - name: tmp
              mountPath: /tmp

        {{- if include "openab-line.tunnelEnabled" . }}
        {{- if and (not .Values.tunnel.token) (not .Values.existingSecret) }}
        {{- fail "tunnel.token is required when tunnel.enabled=true (or provide existingSecret with cloudflare-tunnel-token)" }}
        {{- end }}
        - name: cloudflared
          image: {{ printf "%s:%s" .Values.tunnel.image .Values.tunnel.tag }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openab-line.secretName" . }}
                  key: cloudflare-tunnel-token
          {{- with .Values.tunnel.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openab-line.fullname" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "openab-line.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
